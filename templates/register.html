<!DOCTYPE html>
<html>
<head>
    <title>Register - SignSpeak</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div style="width:400px;margin:80px auto;padding:30px;background:white;border-radius:10px;box-shadow:0 0 10px gray;">

<h2 align="center">Create Account</h2>

<form method="POST">

<input type="text"
name="name"
placeholder="Full Name"
required
style="width:100%;padding:12px;margin:10px 0;">

<input type="email"
name="email"
placeholder="Email"
required
style="width:100%;padding:12px;margin:10px 0;">

<input type="password"
name="password"
placeholder="Password"
required
style="width:100%;padding:12px;margin:10px 0;">

<button type="submit"
style="width:100%;padding:12px;background:#2563eb;color:white;border:none;">
Register
</button>

</form>

<p align="center">
Already have an account?
<a href="/login">Login</a>
</p>

</div>

</body>
</html>
