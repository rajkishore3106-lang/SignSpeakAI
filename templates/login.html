<!DOCTYPE html>
<html>
<head>
    <title>Login - SignSpeak</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div style="width:400px;margin:80px auto;padding:30px;background:white;border-radius:10px;box-shadow:0 0 10px gray;">

<h2 align="center">Login</h2>

<form method="POST">

<input
type="email"
name="email"
placeholder="Email"
required
style="width:100%;padding:12px;margin:10px 0;">

<input
type="password"
name="password"
placeholder="Password"
required
style="width:100%;padding:12px;margin:10px 0;">

<button
type="submit"
style="width:100%;padding:12px;background:#2563eb;color:white;border:none;">
Login
</button>

</form>

<p align="center">
Don't have an account?
<a href="/register">Register</a>
</p>

</div>

</body>
</html>
