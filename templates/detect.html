<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Detection</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f7fb;
}

header{
    background:#1e3a8a;
    color:white;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
}

.detect-container{
    text-align:center;
    padding:40px;
}

.camera{
    width:700px;
    height:500px;
    margin:auto;
    background:black;
    border-radius:15px;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.buttons{
    margin-top:20px;
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

button:hover{
    background:#1d4ed8;
}

textarea{
    width:700px;
    height:120px;
    margin-top:25px;
    font-size:22px;
    padding:15px;
    border-radius:10px;
}

</style>

</head>

<body>

<header>

<h2>🤟 SignSpeak AI</h2>

<nav>
<a href="/">Home</a>
<a href="/detect">Detection</a>
<a href="/about">About</a>
<a href="/contact">Contact</a>
</nav>

</header>

<div class="detect-container">

<h1>AI Sign Language Detection</h1>

<div class="camera">

<video id="video" autoplay playsinline></video>

</div>

<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<div class="buttons">

<button onclick="startCamera()">▶ Start Camera</button>

<button onclick="stopCamera()">⏹ Stop Camera</button>

<button onclick="detectSign()">🤖 Detect Sign</button>

</div>

<textarea
id="output"
placeholder="Prediction will appear here..."
readonly></textarea>

<br>

<button onclick="speakText()">🔊 Speak</button>

<button onclick="clearText()">🗑 Clear</button>

</div>

<script>

let stream;

async function startCamera(){

    stream = await navigator.mediaDevices.getUserMedia({
        video:true
    });

    document.getElementById("video").srcObject = stream;

}

function stopCamera(){

    if(stream){

        stream.getTracks().forEach(track=>track.stop());

    }

}

async function detectSign(){

    const video=document.getElementById("video");
    const canvas=document.getElementById("canvas");

    const ctx=canvas.getContext("2d");

    ctx.drawImage(video,0,0,640,480);

    const image=canvas.toDataURL("image/jpeg");

    const response=await fetch("/predict",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            image:image
        })

    });

    const result=await response.json();

    document.getElementById("output").value=result.prediction;

}

function speakText(){

    let speech=new SpeechSynthesisUtterance(
        document.getElementById("output").value
    );

    speechSynthesis.speak(speech);

}

function clearText(){

    document.getElementById("output").value="";

}

</script>

</body>
</html>
